# =============================================================================
# nginx-local-combined.conf — bond-ai LOCAL DEV combined mode (NOT for prod)
# =============================================================================
# Front door for `make dev-combined`. Run as a Docker container managed by the
# bond-ai Makefile.
#
# DELIBERATELY MINIMAL: nginx handles the app UI and REST API only. OAuth
# callbacks (both user-login /auth/* and MCP /connections/*) BYPASS nginx and
# hit the backends directly:
#
#   browser → http://localhost:8002/auth/<provider>/callback   (bond-ai)
#   browser → http://localhost:8000/connections/<svc>/callback (bond-mcps)
#
# This works because browser cookies on localhost are not port-scoped — a
# cookie set by the OAuth callback at :8002 is sent on requests to :8080 (same
# hostname, no Domain attribute = host-only by spec, ports ignored for
# matching). SameSite=Strict allows it because localhost is one site.
# Confirmed empirically; see docs/local-dev-combined-mode.md.
#
# Net effect: no new OAuth callback URLs need to be registered. The existing
# :8000 (MCP) and :8002 (user-login) callbacks keep working unchanged.
#
# Required upstreams (host ports):
#   bond-ai backend (uvicorn)   :8002   /rest, /health
#   Flutter web (dev server)     :3002   everything else
#
# Drops HSTS and strict CSP from nginx-combined.conf — both assume HTTPS and
# a static SPA build.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 8080;
    server_name localhost;

    server_tokens off;
    client_max_body_size 50m;

    # ------------------------------------------------------------------------
    # /rest/* → bond-ai backend (strips /rest prefix)
    # /rest/health → backend /health, etc.
    # ------------------------------------------------------------------------
    location /rest/ {
        proxy_pass http://host.docker.internal:8002/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (no-op for plain HTTP/SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ------------------------------------------------------------------------
    # /health → bond-ai backend (used by curl smoke tests)
    # ------------------------------------------------------------------------
    location = /health {
        proxy_pass http://host.docker.internal:8002/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------------
    # Everything else → Flutter dev-server on :3002.
    # WebSocket upgrade headers preserved for hot-reload (may not be reliable
    # through nginx — split mode is the fallback for active Flutter iteration).
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://host.docker.internal:3002/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
