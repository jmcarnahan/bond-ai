# =============================================================================
# nginx-local-combined.conf — bond-ai LOCAL DEV combined mode (NOT for prod)
# =============================================================================
# Front door for `make dev-combined`. Run as a Docker container managed by the
# bond-ai Makefile; bond-ai backend, bond-mcps auth proxy, and Flutter dev
# server all run as host processes and are reached via host.docker.internal.
#
# Required upstreams (host ports):
#   bond-ai backend (uvicorn)     :8002   /rest, /auth, /health
#   bond-mcps auth proxy           :8000   /connections
#   Flutter web (dev server)       :3002   everything else
#
# Drops HSTS and the strict CSP from nginx-combined.conf — both assume HTTPS
# and a static SPA build, neither of which exist in local dev.
#
# See docs/local-dev-combined-mode.md for context.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 8080;
    server_name localhost;

    server_tokens off;
    client_max_body_size 50m;

    # ------------------------------------------------------------------------
    # /rest/* → bond-ai backend (strips /rest prefix)
    # /rest/health → backend /health, etc.
    # ------------------------------------------------------------------------
    location /rest/ {
        proxy_pass http://host.docker.internal:8002/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (no-op for plain HTTP/SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ------------------------------------------------------------------------
    # /auth/* → bond-ai backend (user-login OAuth callbacks: Google/Okta/Cognito)
    # ------------------------------------------------------------------------
    location /auth/ {
        proxy_pass http://host.docker.internal:8002/auth/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ------------------------------------------------------------------------
    # /health → bond-ai backend (used by curl smoke tests)
    # ------------------------------------------------------------------------
    location = /health {
        proxy_pass http://host.docker.internal:8002/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------------
    # /connections/* → bond-mcps auth proxy (MCP OAuth callbacks)
    # The friendly 503 surfaces "bond-mcps is down" instead of nginx's generic
    # 502 page so devs aren't left guessing which upstream failed.
    # ------------------------------------------------------------------------
    location /connections/ {
        proxy_pass http://host.docker.internal:8000/connections/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        error_page 502 503 504 = @mcps_down;
    }

    location @mcps_down {
        default_type application/json;
        return 503 '{"error":"bond-mcps auth proxy not reachable on :8000","hint":"run \"make dev\" or \"make dev-combined\" in ../bond-mcps/"}';
    }

    # ------------------------------------------------------------------------
    # Forward-allocated: bond-mcps Authorization Server (JWT mode, :8001).
    # Uncomment when dev-multitenant becomes the default workflow.
    # ------------------------------------------------------------------------
    # location /connect/ {
    #     proxy_pass http://host.docker.internal:8001/connect/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_http_version 1.1;
    # }
    # location /oauth/ {
    #     proxy_pass http://host.docker.internal:8001/oauth/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location /.well-known/ {
    #     proxy_pass http://host.docker.internal:8001/.well-known/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ------------------------------------------------------------------------
    # Everything else → Flutter dev-server on :3002.
    # WebSocket upgrade headers preserved for hot-reload (may not be reliable
    # through nginx — split mode is the fallback for active Flutter iteration).
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://host.docker.internal:3002/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
