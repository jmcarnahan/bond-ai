# =============================================================================
# nginx-local-combined.conf — bond-ai LOCAL DEV combined mode (NOT for prod)
# =============================================================================
# Front door for `make dev-combined`. Run as a Docker container managed by the
# bond-ai Makefile. Listens on :8000 so every OAuth callback URL already
# registered in provider consoles (Google / Okta / Cognito for user-login;
# Atlassian / GitHub / Microsoft for MCP) keeps working without any provider
# config changes.
#
# Required upstreams (host ports):
#   bond-ai backend (uvicorn)        :8002    /rest, /auth, /login, /health
#   bond-mcps auth proxy             :18000   /connections (relocated from
#                                              :8000 in combined mode so
#                                              nginx can take the front door)
#   Flutter web (dev server)         :3002    everything else
#
# Note that bond-mcps's :18000 is a COMBINED-MODE port — split-mode `make dev`
# in bond-mcps keeps the auth proxy on :8000 as before.
#
# Drops HSTS and strict CSP from nginx-combined.conf — both assume HTTPS and
# a static SPA build, neither of which exist in local dev.
#
# See docs/local-dev-combined-mode.md for context.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    # 8080 is the in-container port. The Makefile maps host :8000 → :8080.
    # Keeping the in-container port constant lets the host-facing port
    # change without rewriting this config.
    listen 8080;
    server_name localhost;

    server_tokens off;
    client_max_body_size 50m;

    # ------------------------------------------------------------------------
    # /rest/* → bond-ai backend (strips /rest prefix)
    # /rest/health → backend /health, etc.
    # ------------------------------------------------------------------------
    location /rest/ {
        proxy_pass http://host.docker.internal:8002/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket upgrade (no-op for plain HTTP/SSE)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ------------------------------------------------------------------------
    # /auth/* → bond-ai backend (user-login OAuth callbacks: Google/Okta/Cognito)
    # ------------------------------------------------------------------------
    location /auth/ {
        proxy_pass http://host.docker.internal:8002/auth/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ------------------------------------------------------------------------
    # /login/* → bond-ai backend (user clicks "Sign in with X" → backend
    # returns the OAuth provider redirect)
    # ------------------------------------------------------------------------
    location /login/ {
        proxy_pass http://host.docker.internal:8002/login/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ------------------------------------------------------------------------
    # /health → bond-ai backend (used by curl smoke tests)
    # ------------------------------------------------------------------------
    location = /health {
        proxy_pass http://host.docker.internal:8002/health;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------------
    # /connections/* → bond-mcps auth proxy (MCP OAuth callbacks).
    # Note: bond-mcps moves to :18000 in combined mode so nginx can take :8000.
    # The friendly 503 surfaces "bond-mcps is down" instead of a generic 502.
    # ------------------------------------------------------------------------
    location /connections/ {
        proxy_pass http://host.docker.internal:18000/connections/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_intercept_errors on;
        error_page 502 503 504 = @mcps_down;
    }

    location @mcps_down {
        default_type application/json;
        return 503 '{"error":"bond-mcps auth proxy not reachable on :18000","hint":"run \"make dev-combined\" in ../bond-mcps/ first"}';
    }

    # ------------------------------------------------------------------------
    # /connect/<provider>/* → bond-mcps per-MCP FastMCP ports (delegated OAuth
    # Connect flow). bond-ai mints the ticket server-side (direct to the MCP
    # port), but the BROWSER hits these paths at the front door, so they must be
    # routed to the MCP that serves each provider's /connect routes. Ports mirror
    # bond-mcps combined-mode (mcp.json): ms-graph 18001, github 18002,
    # atlassian 18003, databricks 18004. Requires bond-mcps to advertise
    # BOND_MCPS_PUBLIC_URL=http://localhost:8000 and run with JWT mode ON (which
    # un-dormants /connect/*). If bond-mcps later hosts /connect on the auth
    # proxy, collapse these into one `location /connect/ → :18000` block.
    # ------------------------------------------------------------------------
    location /connect/ms-graph/   { proxy_pass http://host.docker.internal:18001; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location = /connect/ms-graph   { proxy_pass http://host.docker.internal:18001; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location /connect/github/     { proxy_pass http://host.docker.internal:18002; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location = /connect/github     { proxy_pass http://host.docker.internal:18002; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location /connect/atlassian/  { proxy_pass http://host.docker.internal:18003; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location = /connect/atlassian  { proxy_pass http://host.docker.internal:18003; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location /connect/databricks/ { proxy_pass http://host.docker.internal:18004; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }
    location = /connect/databricks { proxy_pass http://host.docker.internal:18004; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_http_version 1.1; }

    # ------------------------------------------------------------------------
    # Forward-allocated: bond-mcps Authorization Server (JWT mode).
    # Uncomment when dev-multitenant becomes the default workflow.
    # ------------------------------------------------------------------------
    # location /connect/ {
    #     proxy_pass http://host.docker.internal:8001/connect/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_http_version 1.1;
    # }
    # location /oauth/ {
    #     proxy_pass http://host.docker.internal:8001/oauth/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location /.well-known/ {
    #     proxy_pass http://host.docker.internal:8001/.well-known/;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ------------------------------------------------------------------------
    # Static Flutter build (the SPA itself). Mounted by the Makefile from
    # flutterui/build/web. We don't proxy to a live flutter dev-server in
    # combined mode — that path was fragile (DDS hangs, 0.0.0.0 bind quirks,
    # 965-script load waterfall, occasional dev-server crashes). Static is
    # rock-solid and ~25x faster to first paint. Hot reload is unavailable
    # here; use split mode (`make dev`) for active UI iteration.
    # ------------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback: client-side routes return the bundle's index.html
        # and let the Flutter router handle them.
        try_files $uri $uri/ /index.html;
    }
}
