name: "Security Scanning"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  bandit:
    name: Bandit (Python Security)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[sarif]==1.7.10

      - name: Run Bandit
        run: |
          bandit -r bondable/ mcps/ \
            --configfile pyproject.toml \
            --format sarif \
            --output bandit-results.sarif \
            --exit-zero

      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  gitleaks:
    name: Gitleaks (Secret Detection)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="origin/${GITHUB_BASE_REF}..HEAD"
          else
            LOG_OPTS="${{ github.event.before }}..${GITHUB_SHA}"
          fi
          gitleaks detect --source . --config .gitleaks.toml --redact --log-opts="$LOG_OPTS"

  trivy-iac:
    name: Trivy (Terraform Security)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: deployment/terraform-existing-vpc/
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-iac

  dart-analyze:
    name: Dart Analyze (Flutter)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable

      - name: Install dependencies
        working-directory: flutterui
        run: flutter pub get

      - name: Run Dart analyze
        working-directory: flutterui
        run: dart analyze || true
